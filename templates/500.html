{% extends "base.html" %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="container" style="min-height: 60vh; display: flex; align-items: center; justify-content: center;">
    <div style="text-align: center; max-width: 600px;">
        <div style="font-size: 8rem; color: var(--danger); margin-bottom: 20px;">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h1 style="font-size: 4rem; margin-bottom: 15px;">500</h1>
        <h2 style="color: var(--gray-600); margin-bottom: 20px;">Internal Server Error</h2>
        <p style="color: var(--gray-600); font-size: 1.1rem; margin-bottom: 30px;">
            Something went wrong on our end. We're working to fix it. Please try again later.
        </p>
        <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
            <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
                <i class="fas fa-home"></i> Go Home
            </a>
            <a href="javascript:window.location.reload()" class="btn btn-outline btn-lg">
                <i class="fas fa-sync"></i> Retry
            </a>
        </div>
    </div>
</div>
{% endblock %}
