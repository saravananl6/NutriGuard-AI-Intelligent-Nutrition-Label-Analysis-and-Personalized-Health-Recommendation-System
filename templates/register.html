{% extends "base.html" %}

{% block title %}Register - Nutritrack{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        max-width: 500px;
        margin: 60px auto;
        padding: 40px;
        background: var(--white);
        border-radius: 20px;
        box-shadow: var(--shadow-xl);
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 40px;
    }
    
    .auth-header h2 {
        color: var(--primary);
        margin-bottom: 10px;
    }
    
    .auth-header p {
        color: var(--gray-600);
        margin-bottom: 0;
    }
    
    .auth-icon {
        font-size: 4rem;
        color: var(--primary);
        margin-bottom: 20px;
    }
    
    .divider {
        text-align: center;
        margin: 30px 0;
        position: relative;
    }
    
    .divider::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: var(--gray-300);
    }
    
    .divider span {
        background: var(--white);
        padding: 0 15px;
        position: relative;
        color: var(--gray-500);
    }
    
    .auth-footer {
        text-align: center;
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid var(--gray-200);
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h2>Create Account</h2>
            <p>Join Nutritrack for smarter nutrition decisions</p>
        </div>
        
        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label for="email" class="form-label">
                    <i class="fas fa-envelope"></i> Email Address
                </label>
                <input 
                    type="email" 
                    class="form-control" 
                    id="email" 
                    name="email" 
                    placeholder="your.email@example.com" 
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">
                    <i class="fas fa-lock"></i> Password
                </label>
                <input 
                    type="password" 
                    class="form-control" 
                    id="password" 
                    name="password" 
                    placeholder="Create a strong password" 
                    required
                    minlength="6"
                >
                <small style="color: var(--gray-500); font-size: 0.85rem;">
                    Must be at least 6 characters
                </small>
            </div>
            
            <div class="form-group">
                <label for="confirm_password" class="form-label">
                    <i class="fas fa-lock"></i> Confirm Password
                </label>
                <input 
                    type="password" 
                    class="form-control" 
                    id="confirm_password" 
                    name="confirm_password" 
                    placeholder="Re-enter your password" 
                    required
                >
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                <i class="fas fa-rocket"></i> Create Account
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? 
                <a href="{{ url_for('login') }}" style="font-weight: 600;">
                    Sign In <i class="fas fa-arrow-right"></i>
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
