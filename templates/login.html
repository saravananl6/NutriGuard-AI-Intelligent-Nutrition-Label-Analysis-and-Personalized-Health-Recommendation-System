{% extends "base.html" %}

{% block title %}Login - Nutritrack{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        max-width: 500px;
        margin: 60px auto;
        padding: 40px;
        background: var(--white);
        border-radius: 20px;
        box-shadow: var(--shadow-xl);
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 40px;
    }
    
    .auth-header h2 {
        color: var(--primary);
        margin-bottom: 10px;
    }
    
    .auth-header p {
        color: var(--gray-600);
        margin-bottom: 0;
    }
    
    .auth-icon {
        font-size: 4rem;
        color: var(--primary);
        margin-bottom: 20px;
    }
    
    .auth-footer {
        text-align: center;
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid var(--gray-200);
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fas fa-sign-in-alt"></i>
            </div>
            <h2>Welcome Back</h2>
            <p>Sign in to your Nutritrack account</p>
        </div>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email" class="form-label">
                    <i class="fas fa-envelope"></i> Email Address
                </label>
                <input 
                    type="email" 
                    class="form-control" 
                    id="email" 
                    name="email" 
                    placeholder="your.email@example.com" 
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">
                    <i class="fas fa-lock"></i> Password
                </label>
                <input 
                    type="password" 
                    class="form-control" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password" 
                    required
                >
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? 
                <a href="{{ url_for('register') }}" style="font-weight: 600;">
                    Create Account <i class="fas fa-arrow-right"></i>
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
