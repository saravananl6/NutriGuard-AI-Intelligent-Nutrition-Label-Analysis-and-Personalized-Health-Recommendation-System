{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="container" style="min-height: 60vh; display: flex; align-items: center; justify-content: center;">
    <div style="text-align: center; max-width: 600px;">
        <div style="font-size: 8rem; color: var(--primary); margin-bottom: 20px;">
            <i class="fas fa-search"></i>
        </div>
        <h1 style="font-size: 4rem; margin-bottom: 15px;">404</h1>
        <h2 style="color: var(--gray-600); margin-bottom: 20px;">Page Not Found</h2>
        <p style="color: var(--gray-600); font-size: 1.1rem; margin-bottom: 30px;">
            Oops! The page you're looking for doesn't exist or has been moved.
        </p>
        <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
            <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
                <i class="fas fa-home"></i> Go Home
            </a>
            <a href="{{ url_for('checker') }}" class="btn btn-outline btn-lg">
                <i class="fas fa-camera"></i> Start Checking
            </a>
        </div>
    </div>
</div>
{% endblock %}
